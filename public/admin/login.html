<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | AlsxBeats</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:#0f111a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:#11151a;border:1px solid #1c232b;border-radius:20px;padding:48px 40px;width:100%;max-width:380px}
        .logo{font-size:22px;font-weight:700;text-align:center;margin-bottom:8px}
        .logo span{color:#4ecdc4}
        .subtitle{text-align:center;color:#94a3b8;font-size:13px;margin-bottom:32px}
        label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
        input{width:100%;background:#0b0d14;border:1px solid #1c232b;color:#fff;padding:12px 16px;border-radius:8px;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:.2s}
        input:focus{border-color:#4ecdc4;box-shadow:0 0 0 3px rgba(78,205,196,.1)}
        .btn{width:100%;background:#4ecdc4;color:#000;border:none;padding:13px;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;margin-top:20px;transition:.2s}
        .btn:hover{opacity:.85}
        .error{color:#ef4444;font-size:13px;text-align:center;margin-top:12px;display:none}
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Alsx<span>Beats</span></div>
        <p class="subtitle">Panel de administración</p>
        <form id="form">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autofocus required>
            <button type="submit" class="btn">Entrar</button>
            <p class="error" id="error">Contraseña incorrecta</p>
        </form>
    </div>
    <script>
    document.getElementById('form').addEventListener('submit', async e => {
        e.preventDefault();
        const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ password: document.getElementById('password').value })
        });
        if (res.ok) {
            window.location.href = '/admin';
        } else {
            document.getElementById('error').style.display = 'block';
        }
    });
    </script>
</body>
</html>
