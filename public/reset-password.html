<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña — AlsxBeats</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0b0d14;--panel:#11151a;--accent:#4ecdc4;--border:#1c232b;--muted:#94a3b8}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column}
        header{padding:18px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
        .logo{font-size:20px;font-weight:900;text-decoration:none;color:#fff}.logo span{color:var(--accent)}
        main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;overflow:hidden}
        main::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(78,205,196,.1) 0%,transparent 65%);pointer-events:none}
        .card{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:440px;position:relative;z-index:1}
        .card-icon{width:52px;height:52px;border-radius:14px;background:rgba(78,205,196,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:22px;color:var(--accent)}
        h1{font-size:22px;font-weight:800;text-align:center;margin-bottom:8px}
        .subtitle{font-size:14px;color:var(--muted);text-align:center;margin-bottom:32px;line-height:1.6}
        .form-group{margin-bottom:18px}
        label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
        .input-wrap{position:relative}
        .input-wrap > i.icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
        input{width:100%;background:#0b0d14;border:1.5px solid var(--border);color:#fff;font-size:14px;font-family:'Inter',sans-serif;padding:13px 14px 13px 42px;border-radius:10px;outline:none;transition:.2s}
        input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(78,205,196,.1)}
        input::placeholder{color:#3a4556}
        .input-wrap input[type="password"],.input-wrap input[type="text"]{padding-right:40px}
        .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:4px;transition:.2s}
        .toggle-pw:hover{color:#fff}

        /* Indicador de fuerza */
        .strength-bar{display:flex;gap:4px;margin-top:8px}
        .strength-bar span{flex:1;height:3px;border-radius:999px;background:#1c232b;transition:background .3s}
        .strength-label{font-size:11px;color:var(--muted);margin-top:4px;min-height:14px}

        .btn{width:100%;background:var(--accent);color:#000;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn:hover{opacity:.88}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .msg{font-size:13px;padding:12px 14px;border-radius:8px;margin-bottom:18px;display:none;align-items:center;gap:8px}
        .msg.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#f87171;display:flex}
        .msg.ok{background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.2);color:var(--accent);display:flex;text-align:left}

        /* Token inválido */
        .invalid-state{text-align:center;display:none}
        .invalid-state i{font-size:40px;color:rgba(239,68,68,.5);margin-bottom:16px}
        .invalid-state h2{font-size:18px;font-weight:700;margin-bottom:8px}
        .invalid-state p{font-size:14px;color:var(--muted);margin-bottom:20px}
        .btn-link{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#000;border:none;padding:11px 22px;border-radius:9px;font-size:14px;font-weight:700;text-decoration:none;cursor:pointer}

        .spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo">Alsx<span>Beats</span></a>
</header>
<main>
    <div class="card">

        <!-- Estado: token inválido/expirado -->
        <div class="invalid-state" id="invalid-state">
            <i class="fas fa-circle-xmark"></i>
            <h2>Enlace no válido</h2>
            <p>Este enlace ha expirado o ya fue usado. Solicita uno nuevo.</p>
            <a href="forgot-password.html" class="btn-link"><i class="fas fa-key"></i> Solicitar nuevo enlace</a>
        </div>

        <!-- Formulario -->
        <div id="form-wrapper">
            <div class="card-icon"><i class="fas fa-lock-open"></i></div>
            <h1>Nueva contraseña</h1>
            <p class="subtitle">Elige una contraseña segura para tu cuenta.</p>

            <div class="msg" id="msg"></div>

            <form id="form" onsubmit="submitReset(event)">
                <div class="form-group">
                    <label>Nueva contraseña</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock icon"></i>
                        <input type="password" id="password" placeholder="Mínimo 8 caracteres" required minlength="6" autocomplete="new-password" oninput="checkStrength(this.value)">
                        <button type="button" class="toggle-pw" onclick="togglePw('password','icon1')">
                            <i class="fas fa-eye" id="icon1"></i>
                        </button>
                    </div>
                    <div class="strength-bar">
                        <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
                    </div>
                    <div class="strength-label" id="strength-label"></div>
                </div>

                <div class="form-group">
                    <label>Confirmar contraseña</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock icon"></i>
                        <input type="password" id="password2" placeholder="Repite la contraseña" required autocomplete="new-password">
                        <button type="button" class="toggle-pw" onclick="togglePw('password2','icon2')">
                            <i class="fas fa-eye" id="icon2"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn" id="btn">
                    <i class="fas fa-check"></i> Guardar contraseña
                </button>
            </form>
        </div>

    </div>
</main>
<script>
const token = new URLSearchParams(location.search).get('token');

if (!token) {
    document.getElementById('form-wrapper').style.display = 'none';
    document.getElementById('invalid-state').style.display = 'block';
}

function togglePw(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
}

function checkStrength(pw) {
    const bars   = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
    const label  = document.getElementById('strength-label');
    const colors = ['#ef4444','#f59e0b','#3b82f6','#22c55e'];
    const labels = ['Muy débil','Débil','Buena','Fuerte'];

    let score = 0;
    if (pw.length >= 8)                         score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw))                       score++;
    if (/[^A-Za-z0-9]/.test(pw))               score++;

    bars.forEach((b, i) => { b.style.background = i < score ? colors[score - 1] : '#1c232b'; });
    label.textContent  = pw.length ? labels[score - 1] || '' : '';
    label.style.color  = score > 0 ? colors[score - 1] : 'var(--muted)';
}

async function submitReset(e) {
    e.preventDefault();
    const msg  = document.getElementById('msg');
    const btn  = document.getElementById('btn');
    const pw   = document.getElementById('password').value;
    const pw2  = document.getElementById('password2').value;
    msg.className = 'msg';

    if (pw !== pw2) {
        msg.className = 'msg err';
        msg.innerHTML = '<i class="fas fa-circle-exclamation"></i> Las contraseñas no coinciden.';
        return;
    }
    if (pw.length < 6) {
        msg.className = 'msg err';
        msg.innerHTML = '<i class="fas fa-circle-exclamation"></i> La contraseña debe tener al menos 6 caracteres.';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Guardando...';

    const r    = await fetch('/api/auth/reset-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token, password: pw })
    });
    const data = await r.json();

    if (!r.ok) {
        if (r.status === 400 && data.error?.includes('válido')) {
            document.getElementById('form-wrapper').style.display = 'none';
            document.getElementById('invalid-state').style.display = 'block';
            return;
        }
        msg.className = 'msg err';
        msg.innerHTML = `<i class="fas fa-circle-exclamation"></i> ${data.error}`;
        btn.disabled  = false;
        btn.innerHTML = '<i class="fas fa-check"></i> Guardar contraseña';
        return;
    }

    document.getElementById('form').innerHTML = `
        <div style="text-align:center;padding:16px 0">
            <i class="fas fa-circle-check" style="font-size:40px;color:var(--accent);margin-bottom:16px;display:block"></i>
            <p style="font-size:15px;font-weight:600;margin-bottom:8px">¡Contraseña actualizada!</p>
            <p style="font-size:13px;color:var(--muted);margin-bottom:24px">Ya puedes iniciar sesión con tu nueva contraseña.</p>
            <a href="login.html" style="background:var(--accent);color:#000;font-weight:700;padding:12px 28px;border-radius:10px;text-decoration:none;font-size:14px">
                Ir al login
            </a>
        </div>
    `;
}
</script>
</body>
</html>
