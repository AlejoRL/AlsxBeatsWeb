<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — AlsxBeats</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0b0d14;--panel:#11151a;--accent:#4ecdc4;--border:#1c232b;--muted:#94a3b8;--danger:#ef4444}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column}

        /* Nav mínimo */
        header{padding:18px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
        .logo{font-size:20px;font-weight:900;text-decoration:none;color:#fff}.logo span{color:var(--accent)}
        .back-link{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:.2s}
        .back-link:hover{color:#fff}

        /* Layout */
        main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;overflow:hidden}

        main::before{
            content:'';position:absolute;inset:0;
            background:radial-gradient(ellipse 70% 60% at 50% 0%, rgba(78,205,196,.1) 0%, transparent 65%);
            pointer-events:none;
        }

        /* Card */
        .auth-card{
            background:var(--panel);
            border:1px solid var(--border);
            border-radius:24px;
            padding:48px 44px;
            width:100%;max-width:440px;
            position:relative;z-index:1;
        }

        .auth-logo{
            width:52px;height:52px;border-radius:14px;
            background:linear-gradient(135deg,var(--accent),#2980b9);
            display:flex;align-items:center;justify-content:center;
            font-size:20px;font-weight:900;color:#000;
            margin:0 auto 24px;
        }

        .auth-card h1{font-size:22px;font-weight:800;text-align:center;margin-bottom:8px}
        .auth-card p.subtitle{font-size:14px;color:var(--muted);text-align:center;margin-bottom:32px;line-height:1.5}

        /* Form */
        .form-group{margin-bottom:18px}
        label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}

        .input-wrap{position:relative}
        .input-wrap > i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}

        input{
            width:100%;background:#0b0d14;border:1.5px solid var(--border);
            color:#fff;font-size:14px;font-family:'Inter',sans-serif;
            padding:13px 14px 13px 42px;border-radius:10px;outline:none;
            transition:border-color .2s,box-shadow .2s;
        }
        input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(78,205,196,.1)}
        input::placeholder{color:#3a4556}

        .toggle-pw{
            position:absolute;right:14px;top:50%;transform:translateY(-50%);
            background:none;border:none;color:var(--muted);cursor:pointer;
            font-size:13px;padding:4px;transition:.2s;z-index:2;
        }
        .toggle-pw:hover{color:#fff}
        .input-wrap input[type="password"],.input-wrap input[type="text"]{padding-right:40px}

        .btn-submit{
            width:100%;background:var(--accent);color:#000;
            border:none;padding:14px;border-radius:10px;
            font-size:15px;font-weight:700;font-family:'Inter',sans-serif;
            cursor:pointer;transition:opacity .2s;margin-top:8px;
            display:flex;align-items:center;justify-content:center;gap:8px;
        }
        .btn-submit:hover{opacity:.88}
        .btn-submit:disabled{opacity:.5;cursor:not-allowed}

        .error-msg{
            background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
            color:#f87171;font-size:13px;padding:11px 14px;border-radius:8px;
            margin-bottom:18px;display:none;align-items:center;gap:8px;
        }
        .error-msg.show{display:flex}

        .divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--muted);font-size:12px}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

        .alt-link{text-align:center;font-size:14px;color:var(--muted);margin-top:20px}
        .alt-link a{color:var(--accent);font-weight:600;text-decoration:none}
        .alt-link a:hover{text-decoration:underline}

        .spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">Alsx<span>Beats</span></a>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
</header>

<main>
    <div class="auth-card">
        <div class="auth-logo">
            <img src="assets/images/logo.png" alt="AlsxBeats" style="width:36px;height:36px;object-fit:contain;">
        </div>
        <h1>Bienvenido de nuevo</h1>
        <p class="subtitle">Inicia sesión para acceder a tus compras y licencias.</p>

        <div class="error-msg" id="error-msg">
            <i class="fas fa-circle-exclamation"></i>
            <span id="error-text"></span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-pw" onclick="togglePw()">
                        <i class="fas fa-eye" id="pw-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                Iniciar sesión
            </button>
        </form>

        <div class="divider">o</div>

        <p class="alt-link">¿No tienes cuenta? <a href="register.html">Regístrate gratis</a></p>
    </div>
</main>

<script>
async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');
    const errTxt = document.getElementById('error-text');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Entrando...';
    err.classList.remove('show');

    const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            email:    document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
        })
    });

    const data = await res.json();

    if (!res.ok) {
        errTxt.textContent = data.error;
        err.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Iniciar sesión';
        return;
    }

    // Redirigir según de dónde venía
    const next = new URLSearchParams(location.search).get('next') || 'index.html';
    window.location.href = next;
}

function togglePw() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('pw-icon');
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
}

// Si ya está logueado, redirigir
fetch('/api/auth/me').then(r => r.json()).then(d => {
    if (d.user) window.location.href = 'index.html';
});
</script>
</body>
</html>
