<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow1" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="rgba(78,205,196,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="85%" r="35%">
      <stop offset="0%" stop-color="rgba(41,128,185,0.10)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0b0d14"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Waveform bars (decorative, bottom) -->
  <g opacity="0.18">
    <rect x="60"  y="530" width="10" height="40"  rx="5" fill="#4ecdc4"/>
    <rect x="78"  y="510" width="10" height="60"  rx="5" fill="#4ecdc4"/>
    <rect x="96"  y="495" width="10" height="75"  rx="5" fill="#4ecdc4"/>
    <rect x="114" y="520" width="10" height="50"  rx="5" fill="#4ecdc4"/>
    <rect x="132" y="505" width="10" height="65"  rx="5" fill="#4ecdc4"/>
    <rect x="150" y="535" width="10" height="35"  rx="5" fill="#4ecdc4"/>
    <rect x="168" y="515" width="10" height="55"  rx="5" fill="#4ecdc4"/>
    <rect x="186" y="490" width="10" height="80"  rx="5" fill="#4ecdc4"/>
    <rect x="204" y="525" width="10" height="45"  rx="5" fill="#4ecdc4"/>
    <rect x="222" y="500" width="10" height="70"  rx="5" fill="#4ecdc4"/>
    <rect x="240" y="540" width="10" height="30"  rx="5" fill="#4ecdc4"/>
    <rect x="258" y="510" width="10" height="60"  rx="5" fill="#4ecdc4"/>

    <rect x="940"  y="530" width="10" height="40"  rx="5" fill="#4ecdc4"/>
    <rect x="958"  y="500" width="10" height="70"  rx="5" fill="#4ecdc4"/>
    <rect x="976"  y="515" width="10" height="55"  rx="5" fill="#4ecdc4"/>
    <rect x="994"  y="535" width="10" height="35"  rx="5" fill="#4ecdc4"/>
    <rect x="1012" y="495" width="10" height="75"  rx="5" fill="#4ecdc4"/>
    <rect x="1030" y="520" width="10" height="50"  rx="5" fill="#4ecdc4"/>
    <rect x="1048" y="505" width="10" height="65"  rx="5" fill="#4ecdc4"/>
    <rect x="1066" y="490" width="10" height="80"  rx="5" fill="#4ecdc4"/>
    <rect x="1084" y="525" width="10" height="45"  rx="5" fill="#4ecdc4"/>
    <rect x="1102" y="510" width="10" height="60"  rx="5" fill="#4ecdc4"/>
    <rect x="1120" y="540" width="10" height="30"  rx="5" fill="#4ecdc4"/>
  </g>

  <!-- Favicon icon (top center) -->
  <rect x="561" y="130" width="78" height="78" rx="18" fill="#0b0d14" stroke="rgba(78,205,196,0.3)" stroke-width="1.5"/>
  <text x="600" y="194" font-family="Arial Black, Impact, sans-serif" font-size="52" font-weight="900" text-anchor="middle" fill="url(#iconGrad)">A</text>
  <rect x="579" y="213" width="42" height="5" rx="2.5" fill="#4ecdc4" opacity="0.5"/>

  <!-- Main title -->
  <text x="600" y="320" font-family="Arial Black, Impact, sans-serif" font-size="88" font-weight="900" text-anchor="middle" letter-spacing="-2">
    <tspan fill="white">Alsx</tspan><tspan fill="url(#textGrad)">Beats</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="378" font-family="Arial, Helvetica, sans-serif" font-size="24" text-anchor="middle" fill="#94a3b8" letter-spacing="0.5">
    Beats de alta calidad · Licencias flexibles · Descarga instantánea
  </text>

  <!-- Divider line -->
  <rect x="480" y="410" width="240" height="1.5" rx="1" fill="rgba(78,205,196,0.25)"/>

  <!-- Genre tags -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#4ecdc4">
    <rect x="296" y="428" width="76" height="28" rx="14" fill="rgba(78,205,196,0.1)" stroke="rgba(78,205,196,0.25)" stroke-width="1"/>
    <text x="334" y="447" text-anchor="middle">Trap</text>

    <rect x="384" y="428" width="76" height="28" rx="14" fill="rgba(78,205,196,0.1)" stroke="rgba(78,205,196,0.25)" stroke-width="1"/>
    <text x="422" y="447" text-anchor="middle">R&amp;B</text>

    <rect x="472" y="428" width="76" height="28" rx="14" fill="rgba(78,205,196,0.1)" stroke="rgba(78,205,196,0.25)" stroke-width="1"/>
    <text x="510" y="447" text-anchor="middle">Drill</text>

    <rect x="560" y="428" width="76" height="28" rx="14" fill="rgba(78,205,196,0.1)" stroke="rgba(78,205,196,0.25)" stroke-width="1"/>
    <text x="598" y="447" text-anchor="middle">Lo-Fi</text>

    <rect x="648" y="428" width="112" height="28" rx="14" fill="rgba(78,205,196,0.1)" stroke="rgba(78,205,196,0.25)" stroke-width="1"/>
    <text x="704" y="447" text-anchor="middle">Afrobeats</text>

    <rect x="772" y="428" width="136" height="28" rx="14" fill="rgba(78,205,196,0.1)" stroke="rgba(78,205,196,0.25)" stroke-width="1"/>
    <text x="840" y="447" text-anchor="middle">Reggaeton</text>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="590" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle" fill="#3a4556">
    alsxbeats-web.onrender.com
  </text>
</svg>
