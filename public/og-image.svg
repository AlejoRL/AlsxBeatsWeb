<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#1a2a2a"/>
      <stop offset="100%" stop-color="#0b0d14"/>
    </radialGradient>
    <radialGradient id="icon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(78,205,196,0.22)"/>
      <stop offset="100%" stop-color="rgba(78,205,196,0)"/>
    </radialGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#2272a8"/>
    </linearGradient>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.45"/>
      </feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Subtle border frame -->
  <rect x="32" y="32" width="1136" height="566" rx="24" fill="none" stroke="rgba(78,205,196,0.08)" stroke-width="1.5"/>

  <!-- Glow halo behind icon -->
  <ellipse cx="600" cy="270" rx="220" ry="200" fill="url(#icon-glow)"/>

  <!-- Icon background square -->
  <rect x="516" y="166" width="168" height="168" rx="36" fill="#0f1920" filter="url(#soft-shadow)"/>
  <rect x="516" y="166" width="168" height="168" rx="36" fill="none" stroke="rgba(78,205,196,0.35)" stroke-width="1.5"/>

  <!-- Letter A -->
  <text
    x="600" y="284"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="110"
    font-weight="900"
    text-anchor="middle"
    fill="url(#icon-grad)"
  >A</text>

  <!-- Wordmark -->
  <text
    x="600" y="398"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="72"
    font-weight="900"
    letter-spacing="1"
    text-anchor="middle"
  >
    <tspan fill="#ffffff">Alsx</tspan><tspan fill="url(#text-grad)">Beats</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="600" y="448"
    font-family="Arial, Helvetica, sans-serif"
    font-size="20"
    text-anchor="middle"
    fill="rgba(148,163,184,0.75)"
    letter-spacing="3"
  >PREMIUM BEATS STORE</text>

  <!-- Bottom accent line -->
  <rect x="540" y="482" width="120" height="2" rx="1" fill="url(#text-grad)" opacity="0.6"/>
</svg>
