<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo — AlsxBeats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/cart.css">
    <style>
        *  { box-sizing: border-box; }
        body { padding-bottom: 88px; }

        /* ── SEARCH BAR ─────────────────────────────────── */
        .cat-search-section {
            background: #11151a;
            border-bottom: 1px solid #1c232b;
            padding: 28px 40px;
        }
        .cat-search-wrap {
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0b0d14;
            border: 1.5px solid #1c232b;
            border-radius: 14px;
            padding: 0 20px;
            transition: border-color .2s;
        }
        .cat-search-wrap:focus-within { border-color: var(--accent-celeste); }
        .cat-search-wrap i { color: #3a4556; font-size: 15px; }
        .cat-search-wrap input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            padding: 16px 0;
        }
        .cat-search-wrap input::placeholder { color: #3a4556; }

        /* ── LAYOUT ─────────────────────────────────────── */
        .cat-body {
            max-width: 1280px;
            margin: 0 auto;
            padding: 28px 40px 60px;
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* ── SIDEBAR ─────────────────────────────────────── */
        .cat-sidebar {
            background: #11151a;
            border: 1px solid #1c232b;
            border-radius: 16px;
            padding: 20px;
            position: sticky;
            top: 80px;
        }

        .filter-block { margin-bottom: 22px; }
        .filter-block:last-child { margin-bottom: 0; }

        .filter-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: #3a4556;
            margin-bottom: 10px;
            display: block;
        }

        .genre-tab {
            display: block;
            width: 100%;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: .15s;
        }
        .genre-tab:hover { background: rgba(255,255,255,.04); color: #fff; }
        .genre-tab.active { background: rgba(78,205,196,.1); color: var(--accent-celeste); font-weight: 600; }

        .filter-select {
            width: 100%;
            background: #0b0d14;
            border: 1.5px solid #1c232b;
            color: #94a3b8;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            padding: 9px 12px;
            border-radius: 9px;
            outline: none;
            cursor: pointer;
            margin-bottom: 8px;
            transition: border-color .2s;
        }
        .filter-select:focus { border-color: var(--accent-celeste); }
        .filter-select option { background: #11151a; }

        .btn-clear-filters {
            width: 100%;
            background: rgba(239,68,68,.07);
            border: 1px solid rgba(239,68,68,.15);
            color: #f87171;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: .2s;
            display: none;
            margin-top: 4px;
        }
        .btn-clear-filters:hover { background: rgba(239,68,68,.14); }
        .btn-clear-filters.show { display: block; }

        /* ── BEAT LIST ──────────────────────────────────── */
        .cat-main { min-width: 0; }

        .cat-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 8px 0;
        }
        .cat-count { font-size: 12px; color: #3a4556; }
        .cat-count strong { color: #94a3b8; }

        /* Beat list header */
        .beat-list-head {
            display: grid;
            grid-template-columns: 40px 48px 1fr 120px 100px 90px 160px;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            border-bottom: 1px solid #1c232b;
            margin-bottom: 4px;
        }
        .beat-list-head span {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: #3a4556;
        }

        /* Beat row */
        .beat-list { display: flex; flex-direction: column; }

        .beat-row {
            display: grid;
            grid-template-columns: 40px 48px 1fr 120px 100px 90px 160px;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: background .15s;
            border-bottom: 1px solid rgba(255,255,255,.03);
        }
        .beat-row:hover { background: rgba(255,255,255,.04); }
        .beat-row.playing { background: rgba(78,205,196,.06); }

        /* Play button */
        .row-play {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,.07);
            border: none;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s, transform .15s;
            flex-shrink: 0;
        }
        .row-play:hover { background: var(--accent-celeste); color: #000; transform: scale(1.08); }
        .beat-row.playing .row-play { background: var(--accent-celeste); color: #000; }

        /* Cover */
        .row-cover {
            width: 48px; height: 48px;
            border-radius: 8px;
            object-fit: cover;
            background: #1c232b;
            flex-shrink: 0;
        }

        /* Info */
        .row-info { min-width: 0; }
        .row-title {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        .beat-row.playing .row-title { color: var(--accent-celeste); }
        .row-producer { font-size: 11px; color: #94a3b8; }

        /* Genre tag */
        .row-genre {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-celeste);
            background: rgba(78,205,196,.08);
            border: 1px solid rgba(78,205,196,.15);
            border-radius: 999px;
            padding: 3px 10px;
            white-space: nowrap;
            display: inline-block;
        }

        /* Stats */
        .row-stats { font-size: 12px; color: #94a3b8; white-space: nowrap; }
        .row-stats span { display: block; line-height: 1.8; }

        /* Price */
        .row-price { font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; }
        .row-price small { font-size: 10px; font-weight: 400; color: #94a3b8; display: block; }

        /* Actions */
        .row-actions { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
        .btn-row-lic {
            background: var(--accent-celeste);
            color: #000;
            border: none;
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            transition: opacity .2s;
        }
        .btn-row-lic:hover { opacity: .85; }
        .btn-row-more {
            width: 30px; height: 30px;
            border-radius: 7px;
            background: none;
            border: 1px solid #1c232b;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: .15s;
        }
        .btn-row-more:hover { background: #1c232b; color: #fff; }

        /* No results */
        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: #3a4556;
        }
        .no-results i { font-size: 40px; margin-bottom: 16px; display: block; }
        .no-results p { font-size: 15px; margin-bottom: 16px; }

        /* ── BOTTOM PLAYER ──────────────────────────────── */
        #bottom-player {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #11151a;
            border-top: 1px solid #1c232b;
            display: none;
            flex-direction: column;
            z-index: 500;
            padding: 10px 24px 12px;
        }
        #bottom-player.visible { display: flex; }

        /* Fila waveform */
        .bp-wave-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .bp-time { font-size: 11px; color: #94a3b8; white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 34px; }
        .bp-bar {
            flex: 1;
            min-width: 0;
        }
        #bp-waveform {
            width: 100%;
        }

        /* Fila controles */
        .bp-ctrl-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .bp-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .bp-cover {
            width: 40px; height: 40px;
            border-radius: 7px;
            object-fit: cover;
            background: #1c232b;
            flex-shrink: 0;
        }
        .bp-info { min-width: 0; }
        .bp-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bp-artist { font-size: 11px; color: #94a3b8; }

        .bp-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .bp-icon {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 15px;
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: color .15s, background .15s;
        }
        .bp-icon:hover { color: #fff; background: rgba(255,255,255,.06); }
        .bp-icon.liked { color: #ef4444; }
        .bp-play {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--accent-celeste);
            border: none;
            color: #000;
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: opacity .2s, transform .15s;
            flex-shrink: 0;
        }
        .bp-play:hover { opacity: .85; transform: scale(1.06); }

        .bp-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: flex-end;
            min-width: 0;
        }
        .bp-right i { color: #94a3b8; font-size: 13px; }
        .bp-vol {
            width: 70px;
            accent-color: var(--accent-celeste);
            cursor: pointer;
        }

        @media (max-width: 600px) {
            #bottom-player { padding: 8px 14px 10px; }
            .bp-right { display: none; }
            .bp-left { flex: 0 0 auto; max-width: 40%; }
            .bp-title { font-size: 12px; }
        }

        /* ── MEDIUM DESKTOP (pantalla achicada) ─────────── */
        @media (max-width: 1100px) and (min-width: 861px) {
            .beat-row { grid-template-columns: 40px 48px 1fr 90px 140px; gap: 10px; }
            .row-genre-cell, .row-stats { display: none; }
        }

        /* ── MOBILE ────────────────────────────────────── */
        @media (max-width: 860px) {
            .cat-search-section { padding: 20px; }
            .cat-body { grid-template-columns: 1fr; padding: 16px 20px 60px; gap: 16px; }
            .cat-sidebar { position: static; }
            .beat-list-head { display: none; }
            .beat-row { grid-template-columns: 36px 44px 1fr auto; gap: 10px; }
            .row-genre-cell, .row-stats, .row-price { display: none; }
            .row-actions { gap: 6px; }
            .btn-row-lic { font-size: 11px; padding: 7px 10px; }
            .btn-row-more { width: 28px; height: 28px; }
            .bp-vol { display: none; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<header>
    <nav class="nav-container nav-grid">
        <a href="index.html" class="logo">Alsx<span>Beats</span></a>
        <ul class="nav-links nav-center">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="index.html#contacto">Contacto</a></li>
        </ul>
        <div id="auth-widget" class="nav-right">
            <a href="login.html" style="color:#94a3b8;font-size:14px;font-weight:600;text-decoration:none;padding:8px 14px;">Iniciar sesión</a>
            <a href="register.html" style="background:#4ecdc4;color:#000;font-size:13px;font-weight:700;text-decoration:none;padding:8px 18px;border-radius:8px;">Registrarse</a>
        </div>
        <button class="nav-hamburger" id="hamburger" onclick="toggleMobileMenu()" aria-label="Menú">
            <span></span><span></span><span></span>
        </button>
    </nav>
    <div class="mobile-menu" id="mobile-menu">
        <a href="index.html">Inicio</a>
        <a href="index.html#contacto">Contacto</a>
        <div class="mobile-divider"></div>
        <a href="login.html">Iniciar sesión</a>
        <a href="register.html" class="mobile-register">Registrarse</a>
    </div>
</header>

<!-- SEARCH -->
<div class="cat-search-section">
    <div class="cat-search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="filter-search" placeholder="Buscar beats por título, género o tags..." autocomplete="off">
    </div>
</div>

<div class="cat-body">

    <!-- SIDEBAR FILTROS -->
    <aside class="cat-sidebar">
        <div class="filter-block">
            <span class="filter-label">Género</span>
            <div id="genre-pills">
                <button class="genre-tab active" data-genre="">Todos</button>
                <button class="genre-tab" data-genre="Trap">Trap</button>
                <button class="genre-tab" data-genre="R&B">R&amp;B</button>
                <button class="genre-tab" data-genre="Lo-Fi">Lo-Fi</button>
                <button class="genre-tab" data-genre="Drill">Drill</button>
                <button class="genre-tab" data-genre="Afrobeats">Afrobeats</button>
                <button class="genre-tab" data-genre="Hip-Hop">Hip-Hop</button>
                <button class="genre-tab" data-genre="Pop">Pop</button>
                <button class="genre-tab" data-genre="Reggaeton">Reggaeton</button>
            </div>
        </div>

        <div class="filter-block">
            <span class="filter-label">BPM</span>
            <select class="filter-select" id="filter-bpm">
                <option value="">Todos</option>
                <option value="slow">Lento (&lt;85)</option>
                <option value="mid">Medio (85–115)</option>
                <option value="fast">Rápido (115–145)</option>
                <option value="hard">Intenso (145+)</option>
            </select>
        </div>

        <div class="filter-block">
            <span class="filter-label">Tonalidad</span>
            <select class="filter-select" id="filter-key">
                <option value="">Todas</option>
                <option>Cm</option><option>C</option><option>C#m</option><option>C#</option>
                <option>Dm</option><option>D</option><option>D#m</option><option>D#</option>
                <option>Em</option><option>E</option><option>Fm</option><option>F</option>
                <option>F#m</option><option>F#</option><option>Gm</option><option>G</option>
                <option>G#m</option><option>G#</option><option>Am</option><option>A</option>
                <option>A#m</option><option>A#</option><option>Bm</option><option>B</option>
            </select>
        </div>

        <button class="btn-clear-filters" id="btn-clear" onclick="clearFilters()">
            <i class="fas fa-xmark"></i> Limpiar filtros
        </button>
    </aside>

    <!-- BEAT LIST -->
    <div class="cat-main">
        <div class="cat-topbar">
            <p class="cat-count" id="results-count"></p>
        </div>
        <div class="beat-list-head">
            <span></span><span></span>
            <span>Título</span>
            <span>Género</span>
            <span>BPM / Key</span>
            <span>Precio</span>
            <span></span>
        </div>
        <div class="beat-list" id="catalogue-grid"></div>
    </div>

</div>

<!-- BOTTOM PLAYER -->
<div id="bottom-player">
    <!-- Fila waveform -->
    <div class="bp-wave-row">
        <span class="bp-time" id="bp-cur">0:00</span>
        <div class="bp-bar" id="bp-bar">
            <div id="bp-waveform"></div>
        </div>
        <span class="bp-time" id="bp-dur">0:00</span>
    </div>
    <!-- Fila controles -->
    <div class="bp-ctrl-row">
        <div class="bp-left">
            <img class="bp-cover" id="bp-cover" src="" alt="">
            <div class="bp-info">
                <div class="bp-title" id="bp-title">—</div>
                <div class="bp-artist">AlsxBeats</div>
            </div>
        </div>
        <div class="bp-controls">
            <button class="bp-icon" id="bp-like-btn" title="Me gusta" onclick="bpToggleLike()">
                <i class="far fa-heart"></i>
            </button>
            <button class="bp-icon" title="Anterior" onclick="bpPrev()">
                <i class="fas fa-backward-step"></i>
            </button>
            <button class="bp-play" id="bp-play-btn" onclick="bpTogglePlay()">
                <i class="fas fa-play" id="bp-play-icon"></i>
            </button>
            <button class="bp-icon" title="Siguiente" onclick="bpNext()">
                <i class="fas fa-forward-step"></i>
            </button>
            <button class="bp-icon" title="Playlist">
                <i class="fas fa-list"></i>
            </button>
        </div>
        <div class="bp-right">
            <i class="fas fa-volume-high"></i>
            <input type="range" class="bp-vol" id="bp-vol" min="0" max="1" step="0.05" value="1" oninput="bpSetVol(this.value)">
        </div>
    </div>
</div>

<script src="js/main.js"></script>
<script src="js/cart.js"></script>
<script src="js/catalog.js"></script>
<script src="js/auth.js"></script>
<script src="https://unpkg.com/wavesurfer.js"></script>
<script>
function toggleMobileMenu() {
    document.getElementById('mobile-menu').classList.toggle('open');
}

// ── Bottom Player (WaveSurfer) ────────────────────────────
const bpPanel    = document.getElementById('bottom-player');
const bpPlayIcon = document.getElementById('bp-play-icon');
const bpCur      = document.getElementById('bp-cur');
const bpDur      = document.getElementById('bp-dur');

let currentRow    = null;
let currentBeatId = null;

const wavesurfer = WaveSurfer.create({
    container: '#bp-waveform',
    waveColor: '#1b2330',
    progressColor: '#4ecdc4',
    cursorColor: '#4ecdc4',
    height: 55,
    normalize: true,
    barWidth: 3,
    barGap: 2,
    barRadius: 8,
    cursorWidth: 2,
});

wavesurfer.on('ready', () => {
    bpDur.textContent = fmtTime(wavesurfer.getDuration());
    wavesurfer.play();
    bpPlayIcon.className = 'fas fa-pause';
});

wavesurfer.on('audioprocess', () => {
    bpCur.textContent = fmtTime(wavesurfer.getCurrentTime());
});

wavesurfer.on('seek', () => {
    bpCur.textContent = fmtTime(wavesurfer.getCurrentTime());
});

wavesurfer.on('finish', () => {
    bpPlayIcon.className = 'fas fa-play';
    bpNext();
});

function bpLoad(src, title, cover, row) {
    if (currentRow) currentRow.classList.remove('playing');
    currentRow    = row;
    currentBeatId = row ? row.dataset.id : null;
    if (row) row.classList.add('playing');
    document.getElementById('bp-title').textContent = title;
    document.getElementById('bp-cover').src = cover;
    bpPanel.classList.add('visible');
    bpPlayIcon.className = 'fas fa-pause';
    wavesurfer.load(src);
    updateBpLike();
}

function bpTogglePlay() {
    wavesurfer.playPause();
    bpPlayIcon.className = wavesurfer.isPlaying() ? 'fas fa-pause' : 'fas fa-play';
}

function bpSetVol(v) { wavesurfer.setVolume(parseFloat(v)); }

function fmtTime(s) {
    if (!s || isNaN(s)) return '0:00';
    return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
}

function bpPrev() {
    const rows = Array.from(document.querySelectorAll('.beat-row'));
    const idx  = rows.indexOf(currentRow);
    if (idx > 0) rows[idx - 1].querySelector('.row-play')?.click();
}

function bpNext() {
    const rows = Array.from(document.querySelectorAll('.beat-row'));
    const idx  = rows.indexOf(currentRow);
    if (idx !== -1 && idx < rows.length - 1) rows[idx + 1].querySelector('.row-play')?.click();
}

function updateBpLike() {
    const btn = document.getElementById('bp-like-btn');
    if (!btn || !currentBeatId) return;
    const liked = JSON.parse(localStorage.getItem('likedBeats') || '{}');
    if (liked[currentBeatId]) {
        btn.innerHTML = '<i class="fas fa-heart"></i>';
        btn.classList.add('liked');
    } else {
        btn.innerHTML = '<i class="far fa-heart"></i>';
        btn.classList.remove('liked');
    }
}

function bpToggleLike() {
    if (!currentBeatId) return;
    const liked = JSON.parse(localStorage.getItem('likedBeats') || '{}');
    liked[currentBeatId] = !liked[currentBeatId];
    localStorage.setItem('likedBeats', JSON.stringify(liked));
    updateBpLike();
}

// Exponer para catalog.js
window.bpLoad = bpLoad;
</script>
</body>
</html>
