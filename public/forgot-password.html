<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña — AlsxBeats</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0b0d14;--panel:#11151a;--accent:#4ecdc4;--border:#1c232b;--muted:#94a3b8}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column}
        header{padding:18px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
        .logo{font-size:20px;font-weight:900;text-decoration:none;color:#fff}.logo span{color:var(--accent)}
        .back-link{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:.2s}
        .back-link:hover{color:#fff}
        main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;overflow:hidden}
        main::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(78,205,196,.1) 0%,transparent 65%);pointer-events:none}
        .card{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:440px;position:relative;z-index:1}
        .card-icon{width:52px;height:52px;border-radius:14px;background:rgba(78,205,196,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:22px;color:var(--accent)}
        h1{font-size:22px;font-weight:800;text-align:center;margin-bottom:8px}
        .subtitle{font-size:14px;color:var(--muted);text-align:center;margin-bottom:32px;line-height:1.6}
        .form-group{margin-bottom:18px}
        label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
        .input-wrap{position:relative}
        .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
        input{width:100%;background:#0b0d14;border:1.5px solid var(--border);color:#fff;font-size:14px;font-family:'Inter',sans-serif;padding:13px 14px 13px 42px;border-radius:10px;outline:none;transition:.2s}
        input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(78,205,196,.1)}
        input::placeholder{color:#3a4556}
        .btn{width:100%;background:var(--accent);color:#000;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity .2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn:hover{opacity:.88}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .msg{font-size:13px;padding:12px 14px;border-radius:8px;margin-bottom:18px;display:none;align-items:center;gap:8px}
        .msg.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#f87171;display:flex}
        .msg.ok{background:rgba(78,205,196,.08);border:1px solid rgba(78,205,196,.2);color:var(--accent);display:flex;text-align:left;line-height:1.5}
        .alt-link{text-align:center;font-size:14px;color:var(--muted);margin-top:22px}
        .alt-link a{color:var(--accent);font-weight:600;text-decoration:none}
        .alt-link a:hover{text-decoration:underline}
        .spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo">Alsx<span>Beats</span></a>
    <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al login</a>
</header>
<main>
    <div class="card">
        <div class="card-icon"><i class="fas fa-key"></i></div>
        <h1>Recuperar contraseña</h1>
        <p class="subtitle">Introduce tu email y te enviaremos un enlace para restablecer tu contraseña.</p>

        <div class="msg" id="msg"></div>

        <form id="form" onsubmit="submit(event)">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
                </div>
            </div>
            <button type="submit" class="btn" id="btn">
                <i class="fas fa-paper-plane"></i> Enviar enlace
            </button>
        </form>

        <p class="alt-link"><a href="login.html"><i class="fas fa-arrow-left" style="font-size:11px"></i> Volver al inicio de sesión</a></p>
    </div>
</main>
<script>
async function submit(e) {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    msg.className = 'msg';

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Enviando...';

    const r    = await fetch('/api/auth/forgot-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email: document.getElementById('email').value.trim() })
    });
    const data = await r.json();

    if (!r.ok) {
        msg.className = 'msg err';
        msg.innerHTML = `<i class="fas fa-circle-exclamation"></i> ${data.error}`;
        btn.disabled  = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar enlace';
        return;
    }

    msg.className = 'msg ok';
    msg.innerHTML = `<i class="fas fa-circle-check"></i> ${data.message}`;
    document.getElementById('form').style.display = 'none';
}
</script>
</body>
</html>
